{extend name='main'}

{block name="button"}
<button data-target-submit class='layui-btn layui-btn-sm'>{:lang('保存数据')}</button>
<button data-target-backup class="layui-btn layui-btn-sm layui-btn-danger">{:lang('取消编辑')}</button>
{/block}

{block name="content"}
<div class="think-box-shadow">
    <form method="post" id="RoleForm" class="layui-form layui-card">
        <div class="layui-card-body">
            <label class="layui-form-item relative block">
                <span class="help-label"><b>{:lang('权限名称')}</b>Auth Name</span>
                <input maxlength="100" class="layui-input" name="title" value='{$vo.title|default=""}' required vali-name="{:lang('权限名称')}" placeholder="{:lang('请输入权限名称')}">
                <span class="help-block">{:lang('访问权限名称需要保持不重复，在给用户授权时需要根据名称选择！')}</span>
            </label>
            <label class="layui-form-item relative block">
                <span class="help-label"><b>{:lang('权限描述')}</b>Auth Remark</span>
                <textarea placeholder="{:lang('请输入权限描述')}" maxlength="200" class="layui-textarea" name="desc">{$vo.desc|default=""}</textarea>
            </label>
            <div class="layui-form-item">
                <span class="help-label"><b>{:lang('插件筛选')}</b>Plugin Filter</span>
                <div class="layui-input-inline">
                    <select name="plugin_filter" lay-filter="AuthPluginFilter">
                        <option value="">{:lang('全部插件')}</option>
                    </select>
                </div>
                <div class="layui-form-mid color-desc">{:lang('仅切换当前显示的权限树分组，不会丢失其它插件已勾选的授权节点。')}</div>
            </div>
            <div class="layui-form-item">
                <span class="help-label label-required-prev"><b>{:lang('功能节点')}</b>Auth Nodes</span>
                <ul id="zTree" class="ztree notselect"></ul>
            </div>
            <div class="hr-line-dashed"></div>
            {notempty name='vo.id'}<input name="id" value="{$vo.id}" type="hidden"/>{/notempty}
            <div class="layui-form-item text-center">
                <button data-target-submit class="layui-btn">{:lang('保存数据')}</button>
                <button data-target-backup class="layui-btn layui-btn-danger" type="button">{:lang('取消编辑')}</button>
            </div>
        </div>
    </form>
</div>
{/block}

{block name="script"}
<script>
    $.module.use(['jquery.ztree'], function () {
        new function () {
            let that = this;
            this.data = [];
            this.ztree = null;
            this.states = {};
            this.filter = '{$plugin|default=""}';
            this.setting = {
                view: {showLine: false, showIcon: false, dblClickExpand: false},
                check: {enable: true, nocheck: false, chkboxType: {"Y": "ps", "N": "ps"}}, callback: {
                    beforeClick: function (id, node) {
                        node.children.length < 1 ? that.ztree.checkNode(node, !node.checked, true, true) : that.ztree.expandNode(node);
                        return false;
                    },
                    onCheck: function (id, tree, node) {
                        that.syncState();
                    }
                }
            };
            this.renderChildren = function (list, level, plugin) {
                let childrens = [];
                for (let i in list) {
                    let item = list[i], code = item.plugin || plugin || item.node || '';
                    if (item.node && item.checked) this.states[item.node] = true;
                    childrens.push({
                        open: true, plugin: code, node: item.node, name: item.title || item.node,
                        checked: !!item.checked, children: this.renderChildren(item._sub_ || [], level + 1, code)
                    });
                }
                return childrens;
            };
            this.renderOptions = function () {
                let html = ['<option value="">{:lang("全部插件")}</option>'];
                for (let i in this.data) {
                    if (!this.data[i].plugin) continue;
                    html.push('<option value="' + this.data[i].plugin + '">' + this.data[i].name + ' [ ' + this.data[i].plugin + ' ]</option>');
                }
                $('[name=plugin_filter]').html(html.join('')).val(this.filter);
                layui.form.render('select');
            };
            this.syncState = function () {
                if (!this.ztree) return;
                let nodes = this.ztree.transformToArray(this.ztree.getNodes());
                for (let i in nodes) if (nodes[i].node) this.states[nodes[i].node] = !!nodes[i].checked;
            };
            this.renderTree = function (list) {
                let children = [];
                for (let i in list) {
                    let item = $.extend(true, {}, list[i]);
                    item.checked = !!this.states[item.node];
                    item.children = this.renderTree(item.children || []);
                    if (this.filter && item.plugin !== this.filter) {
                        if (item.children.length < 1) continue;
                    }
                    children.push(item);
                }
                return children;
            };
            this.syncData = function () {
                $.form.load('{:sysuri()}', {id: '{$vo.id|default=0}', action: 'json'}, 'post', function (ret) {
                    that.data = that.renderChildren(ret.data, 1, '');
                    that.renderOptions();
                    return that.showTree(), false;
                });
            };
            this.showTree = function () {
                this.ztree = $.fn.zTree.init($("#zTree"), this.setting, this.renderTree(this.data));
                while (true) {
                    let nodes = this.ztree.getNodesByFilter(function (node) {
                        return (!node.node && node.children.length < 1);
                    });
                    if (nodes.length < 1) break;
                    for (let i in nodes) this.ztree.removeNode(nodes[i]);
                }
            };
            // 刷新数据
            this.syncData();
            // 监听表单提交
            $('#RoleForm').vali(function (form) {
                that.syncState();
                Object.assign(form, {nodes: [], action: 'save'})
                for (let node in that.states) if (that.states[node]) form.nodes.push(node);
                $.form.load('{:sysuri()}', form, 'post');
            });

            layui.form.on('select(AuthPluginFilter)', function (object) {
                that.syncState();
                that.filter = object.value;
                that.showTree();
            });
        };
    });
</script>
{/block}

{block name="style"}
<style>
    ul.ztree li {
        line-height: 24px;
        white-space: normal !important;
    }

    ul.ztree li span.button.switch {
        margin-right: 5px;
    }

    ul.ztree ul ul li {
        display: inline-block;
        white-space: normal;
    }

    ul.ztree > li {
        border: 1px solid rgba(0, 0, 0, 0.10);
        padding: 15px;
        background: rgba(0, 0, 0, 0.05);
        border-radius: 3px;
        margin-bottom: 10px;
    }

    ul.ztree > li > ul {
        padding: 10px;
        margin-top: 10px;
        background: rgba(0, 0, 0, 0.05);
        border-radius: 3px;
    }

    ul.ztree > li > ul > li {
        padding: 5px 0;
    }

    ul.ztree > li > a > span {
        font-size: 15px;
        font-weight: 700;
    }

    ul.ztree .level2 .button.level2 {
        width: 0;
    }

    ul.ztree li span.button.noline_open {
        background-position-y: -73px;
    }

    ul.ztree li span.button.noline_close {
        background-position-y: -73px;
    }

    ul.ztree .level1 > .node_name {
        font-weight: bold;
    }
</style>
{/block}
