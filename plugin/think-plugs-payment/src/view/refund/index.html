{extend name="table"}

{block name="button"}
<!--{if auth("queue")}-->
<!--<button class='layui-btn layui-btn-sm layui-btn-primary' data-queue='{:url("queue")}'>刷新领取次数</button>-->
<!--{/if}-->
{/block}

{block name="content"}
<div class="{$mode==='modal'?'':'think-box-shadow'}">
    {include file='refund/index_search'}
    <table id="PaymentRecordTable" data-url="{:request()->url()}" data-line="3"></table>
</div>
{/block}

{block name='script'}
<script>
    $(function () {
        $('#PaymentRecordTable').layTable({
            even: true, height: 'full',
            sort: {field: 'id', type: 'desc'},
            cols: [[
                /* {if $mode neq 'modal'} */
                {field: 'headimg', title: '{:lang("头像")}', width: 85, align: 'center', templet: '<div>{{-showTableImage(d.user.headimg,true,"md")}}</div>'},
                {
                    field: 'id', title: '{:lang("用户账号")}', minWidth: 170, templet: function (d) {
                        let tpls = [];
                        tpls.push('{:lang("用户昵称")}：{{d.user.nickname||"-"}}');
                        tpls.push('{:lang("绑定账号")}：{{d.user.phone||d.user.email||d.user.username||"-"}}');
                        tpls.push('{:lang("用户编号")}：{{d.user.code||"-"}}');
                        return laytpl(tpls.join('<br>')).render(d);
                    }
                },
                /* {/if} */
                {
                    field: '', title: '{:lang("订单内容")}', minWidth: 100, templet: function (d) {
                        let record = d.record || {};
                        let tpls = [];
                        tpls.push('{:lang("订单名称")}：<b class="color-blue">{{d.record.order_name||"-"}}</b>');
                        tpls.push('{:lang("订单编号")}：<b class="color-blue">{{d.record.order_no||"-"}}</b>');
                        if (record.payment_status) {
                            tpls.push('{:lang("订单金额")}：<b class="color-blue">{:lang("需支付")} {{d.record.order_amount}}</b> {:lang("元")} ( {:lang("已付")} <b class="color-blue">{{d.record.payment_amount}}</b> {:lang("元")} )');
                        } else {
                            if ((record.payment_amount || 0) > 0) {
                                tpls.push('{:lang("订单金额")}：<b class="color-blue">{:lang("需支付")} {{d.record.order_amount}}</b> {:lang("元")} ( {:lang("待审")} <b class="color-blue">{{d.record.payment_amount}}</b> {:lang("元")} )');
                            } else {
                                tpls.push('{:lang("订单金额")}：<b class="color-blue">{:lang("需支付")} {{d.record.order_amount}}</b> {:lang("元")}');
                            }
                        }
                        return laytpl(tpls.join('<br>')).render(d);
                    }
                },
                {
                    field: 'name', title: '{:lang("支付描述")}', minWidth: 100, templet: function (d) {
                        let record = d.record || {};
                        if (record.payment_status) {
                            d.typeInfo = '<b class="color-green">{:lang("已支付")}</b>';
                        } else if (record.channel_type === 'voucher') {
                            if (record.audit_status === 1) {
                                d.typeInfo = '<b class="color-blue">{:lang("待审核")}</b>';
                            } else if (record.audit_status === 2) {
                                d.typeInfo = '<b class="color-green">{:lang("已完成")}</b>';
                            } else if (record.audit_status === 0) {
                                d.typeInfo = '<b class="color-red">{:lang("已拒绝")}</b>';
                            }
                        } else {
                            d.typeInfo = '<b class="color-blue">{:lang("待支付")}</b>';
                        }
                        let tpls = [];

                        tpls.push('{:lang("支付类型")}：{{d.record.channel_type_name||"-"}} {{-d.typeInfo}}');
                        tpls.push('{:lang("交易单号")}：<b class="color-blue">{{d.record.payment_trade||"-"}}</b>');
                        tpls.push('{:lang("操作描述")}：{{d.record.payment_remark||"-"}}');
                        return laytpl(tpls.join('<br>')).render(d);
                    }
                },

                {
                    field: 'name', title: '{:lang("退款内容")}', minWidth: 100, templet: function (d) {
                        let record = d.record || {};
                        if (record.payment_status) {
                            d.typeInfo = '<b class="color-green">{:lang("已支付")}</b>';
                        } else if (record.channel_type === 'voucher') {
                            if (record.audit_status === 1) {
                                d.typeInfo = '<b class="color-blue">{:lang("待审核")}</b>';
                            } else if (record.audit_status === 2) {
                                d.typeInfo = '<b class="color-green">{:lang("已完成")}</b>';
                            } else if (record.audit_status === 0) {
                                d.typeInfo = '<b class="color-red">{:lang("已拒绝")}</b>';
                            }
                        } else {
                            d.typeInfo = '<b class="color-blue">{:lang("待支付")}</b>';
                        }
                        let tpls = [];

                        tpls.push('{:lang("支付类型")}：{{d.record.channel_type_name||"-"}} {{-d.typeInfo}}');
                        tpls.push('{:lang("交易单号")}：<b class="color-blue">{{d.code||"-"}}</b>');
                        tpls.push('{:lang("操作描述")}：{{d.refund_remark||"-"}}');
                        return laytpl(tpls.join('<br>')).render(d);
                    }
                },
                {
                    field: 'id', title: '{:lang("操作时间")}', minWidth: 100, sort: true, templet: function (d) {
                        let tpls = [];
                        tpls.push('{:lang("更新时间")}：{{d.update_time||"-"}}');
                        tpls.push('{:lang("创建时间")}：{{d.create_time||"-"}}');
                        return laytpl(tpls.join('<br>')).render(d)
                    }
                },
                /* {if auth("audit")} */
                {field: 'id', toolbar: '#toolbarPayment', title: '{:lang("操作面板")}', align: 'center', minWidth: 80, width: '10%', fixed: 'right'}
                /* {/if} */
            ]]
        });
    });
</script>

<script type="text/html" id="toolbarPayment">
    <!--{if auth("audit")}-->
    {{# if(d.record && d.record.channel_type === 'voucher'){ }}

    {{# if(d.record.audit_status === 1){ }}
    <a class="layui-btn layui-btn-sm mt20" data-modal="{:url('audit')}" data-value="id#{{d.record.id}}" data-title="{:lang('支付凭证审核')}">{:lang('凭证审核')}</a>
    {{# } else if(d.record.audit_status === 0){ }}
    <a class="layui-btn layui-btn-sm mt20 layui-disabled">{:lang('已经拒绝')}</a>
    {{# } else if(d.record.audit_status === 2){ }}
    <a class="layui-btn layui-btn-sm mt20 layui-disabled">{:lang('已经通过')}</a>
    {{# } }}

    {{#}else{ }}
    <a class="layui-btn layui-btn-sm mt20 layui-disabled">{:lang('无需操作')}</a>
    {{# } }}
    <!--{/if}-->
</script>
{/block}
