<form action="{:sysuri()}" autocomplete="off" class="layui-form layui-form-pane form-search" method="get" onsubmit="return false">

    <div class="layui-form-item layui-inline">
        <label class="layui-form-label">{:lang('终端类型')}</label>
        <div class="layui-input-inline">
            <select class="layui-select" name="utype">
                <option value="">-- {:lang('全部')} --</option>
                {foreach $types as $k=>$v}
                {if isset($get.utype) and $v.field eq $get.utype}
                <option selected value="{$k}">{$v.name|lang}</option>
                {else}
                <option value="{$k}">{$v.name|lang}</option>
                {/if}{/foreach}
            </select>
        </div>
    </div>

    <div class="layui-form-item layui-inline">
        <label class="layui-form-label">{:lang('绑定手机')}</label>
        <label class="layui-input-inline">
            <input class="layui-input" name="phone" placeholder="{:lang('请输入绑定手机')}" value="{$get.phone|default=''}">
        </label>
    </div>

    <div class="layui-form-item layui-inline">
        <label class="layui-form-label">{:lang('用户姓名')}</label>
        <label class="layui-input-inline">
            <input class="layui-input" name="username" placeholder="{:lang('请输入用户姓名')}" value="{$get.username|default=''}">
        </label>
    </div>

    <div class="layui-form-item layui-inline">
        <label class="layui-form-label">{:lang('用户昵称')}</label>
        <label class="layui-input-inline">
            <input class="layui-input" name="nickname" placeholder="{:lang('请输入用户昵称')}" value="{$get.nickname|default=''}">
        </label>
    </div>

    <div class="layui-form-item layui-inline">
        <label class="layui-form-label">{:lang('使用状态')}</label>
        <div class="layui-input-inline">
            <select class="layui-select" name="status">
                <option value="">-- {:lang('全部')} --</option>
                {foreach ['已冻结的用户', '已激活的用户'] as $k=>$v}
                {if $k.'' eq input('status')}
                <option selected value="{$k}">{:lang($v)}</option>
                {else}
                <option value="{$k}">{:lang($v)}</option>
                {/if}{/foreach}
            </select>
        </div>
    </div>

    <div class="layui-form-item layui-inline">
        <label class="layui-form-label">{:lang('首次登录')}</label>
        <div class="layui-input-inline">
            <input class="layui-input" data-date-range name="create_time" placeholder="{:lang('请选择绑定时间')}" value="{$get.create_time|default=''}">
        </div>
    </div>

    <div class="layui-form-item layui-inline">
        <button class="layui-btn layui-btn-primary"><i class="layui-icon">&#xe615;</i> {:lang('搜 索')}</button>
        <button class="layui-btn layui-btn-primary" data-form-export="{:url('index')}?type={$type}" type="button">
            <i class="layui-icon layui-icon-export"></i> {:lang('导 出')}
        </button>
    </div>
</form>

<script>
    $.module.use(['excel'], function (excel) {
        excel.bind(function (data) {

            // 设置表格内容
            data.forEach(function (item, index) {
                data[index] = [
                    {v: item.id, t: 'n'},
                    item.type_name || item.type || '',
                    item.username || '-',
                    item.nickname || '-',
                    item.phone || '-',
                    (item.user || {}).code || '-',
                    item.create_time || '',
                ];
            });

            // 设置表头内容
            data.unshift(['ID', '{:lang("终端类型")}', '{:lang("用户姓名")}', '{:lang("用户昵称")}', '{:lang("绑定手机")}', '{:lang("关联账号")}', '{:lang("首次登录")}']);

            // 设置表格样式
            return this.withStyle(data, {A: 60, B: 80, C: 80, E: 80});

        }, '{:lang("用户账号数据")}' + layui.util.toDateString(Date.now(), '_yyyyMMdd_HHmmss'));
    });
</script>
