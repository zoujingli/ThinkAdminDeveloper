<form action="{:sysuri()}" method="post" class="layui-form layui-card" id="theme">
    <div class="layui-card-body padding-20">

        <div class="layui-form-item margin-bottom-5 label-required-prev">
            <div class="help-label"><b>后台配色方案</b>Theme Style</div>
            <div class="help-block">统一为“标准 / 品牌侧栏 / 双栏导航”三种后台布局语义，选择卡片后会实时预览，确认后再回填系统参数页。</div>

            <div class="theme-palette">
                {foreach $themes as $k=>$v}
                <label class="theme-palette-card{if isset($theme) and $theme eq $k} active{/if}" data-theme-card="{$k}" data-theme-label="{$v.label}" title="{$v.label} / {$k}">
                    {if isset($theme) and $theme eq $k}
                    <input name="site_theme" type="radio" value="{$k}" checked>
                    {else}
                    <input name="site_theme" type="radio" value="{$k}">
                    {/if}

                    <span class="theme-palette-preview {$v.layout}" style="--theme-accent:{$v.primary};--theme-header:{$v.header};--theme-side:{$v.side};--theme-surface:{$v.surface};--theme-body:{$v.body};">
                        <span class="theme-palette-preview-header"></span>
                        <span class="theme-palette-preview-side"></span>
                        <span class="theme-palette-preview-side-alt"></span>
                        <span class="theme-palette-preview-card theme-palette-preview-hero"></span>
                        <span class="theme-palette-preview-card theme-palette-preview-panel"></span>
                        <span class="theme-palette-preview-card theme-palette-preview-panel-right"></span>
                        <span class="theme-palette-preview-line theme-palette-preview-tone"></span>
                        <span class="theme-palette-preview-line theme-palette-preview-copy-1"></span>
                        <span class="theme-palette-preview-line theme-palette-preview-copy-2"></span>
                        <span class="theme-palette-preview-line theme-palette-preview-copy-3"></span>
                        <span class="theme-palette-preview-line theme-palette-preview-copy-4"></span>
                    </span>
                    <span class="theme-palette-meta">
                        <span class="theme-palette-title">{$v.label}</span>
                        <span class="theme-palette-layout">{$v.layout_label}</span>
                    </span>
                    <span class="theme-palette-check layui-icon layui-icon-ok"></span>
                </label>
                {/foreach}
            </div>

            <p class="help-block">选中卡片后会先切换后台预览；点击“确认选择”才会回填到系统参数表单，点击“取消选择”会恢复原主题。</p>
        </div>
    </div>

    <div class="hr-line-dashed"></div>
    <div class="layui-form-item text-center">
        <button class="layui-btn" type="button" data-theme-confirm>确认选择</button>
        <button class="layui-btn layui-btn-danger" type="button" data-theme-cancel>取消选择</button>
    </div>
</form>

<script type="application/json" id="ThemeCatalogJson">{$themes|json_encode|raw}</script>
<script>
    var themePicker = '{:isset($picker) ? $picker : ""}';
    var themeCatalogNode = document.getElementById('ThemeCatalogJson') || {};
    var themeCatalog = JSON.parse(themeCatalogNode.textContent || themeCatalogNode.text || '{}');
    var themeCommitted = false;
    var themeOrigin = (function () {
        var className = String(((top.$ || $)('.layui-layout-body').attr('class') || ''));
        var matched = className.match(/layui-layout-theme-([A-Za-z0-9\-]+)/);
        if (matched && matched[1]) return matched[1];
        return $('form#theme input[name=site_theme]:checked').val() || 'default';
    })();

    var getSelectedTheme = function () {
        return $('form#theme input[name=site_theme]:checked').val() || '';
    };

    var getSelectedLabel = function () {
        var $card = $('form#theme input[name=site_theme]:checked').closest('[data-theme-card]');
        return $card.data('themeLabel') || $.trim($card.find('.theme-palette-title').text()) || getSelectedTheme();
    };

    var applyThemePreview = function (value) {
        var alls = '', prox = 'layui-layout-theme-', curt = prox + value;
        $.each(themeCatalog, function (key) {
            if (key !== value) alls += ' ' + prox + key;
        });
        (top.$ || $)('.layui-layout-body').removeClass($.trim(alls)).addClass(curt);
    };

    var restoreThemePreview = function () {
        if (themeOrigin) applyThemePreview(themeOrigin);
    };

    var syncThemePicker = function (value, label) {
        if (!themePicker) return;
        if (typeof top.window[themePicker] === 'function') {
            top.window[themePicker](value, label);
        }
    };

    var closeThemeDialog = function (element) {
        var index = $(element || 'form#theme').parents('div.layui-layer-page').attr('times');
        if (index && window.layer && typeof layer.close === 'function') {
            layer.close(index);
        }
    };

    var bindThemeLayerClose = function () {
        var index = $('form#theme').parents('div.layui-layer-page').attr('times');
        var $layer = index ? $('#layui-layer' + index) : $();
        if (!$layer.length || $layer.data('themeCloseBound')) return;
        $layer.data('themeCloseBound', '1').on('click.themePreview', '.layui-layer-setwin [class*=layui-layer-close]', function () {
            if (!themeCommitted) restoreThemePreview();
        });
    };

    $('form#theme').on('click', '[data-theme-card]', function () {
        var input = $(this).find('input[name=site_theme]')[0];
        if (!input) return;
        if (!input.checked) {
            input.checked = true;
            $(input).trigger('change');
        }
    });

    $('form#theme').on('change', 'input[name=site_theme]', function () {
        var that = this;
        $('form#theme input[name=site_theme]').each(function () {
            $(this).closest('[data-theme-card]').toggleClass('active', this === that);
        });
        applyThemePreview(that.value);
    });

    $('body').off('click', '[data-theme-confirm]').on('click', '[data-theme-confirm]', function () {
        var value = getSelectedTheme();
        if (!value) return;
        themeCommitted = true;
        syncThemePicker(value, getSelectedLabel());
        closeThemeDialog(this);
    });

    $('body').off('click', '[data-theme-cancel]').on('click', '[data-theme-cancel]', function () {
        restoreThemePreview();
        closeThemeDialog(this);
    });

    setTimeout(bindThemeLayerClose, 0);
</script>
