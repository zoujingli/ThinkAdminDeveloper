<form action="{:sysuri()}" method="post" data-auto="true" class="layui-form layui-card" id="theme">
    <div class="layui-card-body pa20">

        <div class="layui-form-item mb5 label-required-prev">
            <div class="help-label"><b>后台配色方案</b>Theme Style</div>
            <div class="help-block">统一为“标准 / 品牌侧栏 / 双栏导航”三种后台布局语义，新增皮肤可直接预览后保存生效。</div>

            <div class="theme-palette">
                {foreach $themes as $k=>$v}
                <label class="theme-palette-card{if isset($theme) and $theme eq $k} active{/if}" data-theme-card="{$k}" data-theme-label="{$v.label}" title="{$v.label} / {$k}">
                    {if isset($theme) and $theme eq $k}
                    <input name="site_theme" type="radio" value="{$k}" checked>
                    {else}
                    <input name="site_theme" type="radio" value="{$k}">
                    {/if}

                    <span class="theme-palette-preview {$v.layout}" style="--theme-accent:{$v.primary};--theme-header:{$v.header};--theme-side:{$v.side};--theme-surface:{$v.surface};--theme-body:{$v.body};">
                        <span class="theme-palette-preview-header"></span>
                        <span class="theme-palette-preview-side"></span>
                        <span class="theme-palette-preview-side-alt"></span>
                        <span class="theme-palette-preview-card theme-palette-preview-hero"></span>
                        <span class="theme-palette-preview-card theme-palette-preview-panel"></span>
                        <span class="theme-palette-preview-card theme-palette-preview-panel-right"></span>
                        <span class="theme-palette-preview-line theme-palette-preview-tone"></span>
                        <span class="theme-palette-preview-line theme-palette-preview-copy-1"></span>
                        <span class="theme-palette-preview-line theme-palette-preview-copy-2"></span>
                        <span class="theme-palette-preview-line theme-palette-preview-copy-3"></span>
                        <span class="theme-palette-preview-line theme-palette-preview-copy-4"></span>
                    </span>
                    <span class="theme-palette-meta">
                        <span class="theme-palette-title">{$v.label}</span>
                        <span class="theme-palette-layout">{$v.layout_label}</span>
                    </span>
                    <span class="theme-palette-check layui-icon layui-icon-ok"></span>
                </label>
                {/foreach}
            </div>

            <p class="help-block">保存后立即写入当前账号主题；系统默认主题可在系统参数配置中设置，后续新用户登录也会继承。</p>
        </div>
    </div>

    <div class="hr-line-dashed"></div>
    <div class="layui-form-item text-center">
        <button class="layui-btn" type="submit">保存配置</button>
        <button class="layui-btn layui-btn-danger" type="button" data-close>取消修改</button>
    </div>
</form>

<script type="application/json" id="ThemeCatalogJson">{$themes|json_encode|raw}</script>
<script>
    var themeCatalogNode = document.getElementById('ThemeCatalogJson') || {};
    var themeCatalog = JSON.parse(themeCatalogNode.textContent || themeCatalogNode.text || '{}');

    var applyThemePreview = function (value) {
        var alls = '', prox = 'layui-layout-theme-', curt = prox + value;
        $.each(themeCatalog, function (key) {
            if (key !== value) alls += ' ' + prox + key;
        });
        (top.$ || $)('.layui-layout-body').removeClass($.trim(alls)).addClass(curt);
    };

    $('form#theme').on('click', '[data-theme-card]', function () {
        var input = $(this).find('input[name=site_theme]')[0];
        if (!input) return;
        if (!input.checked) {
            input.checked = true;
            $(input).trigger('change');
        }
    });

    $('form#theme').on('change', 'input[name=site_theme]', function () {
        var that = this;
        $('form#theme input[name=site_theme]').each(function () {
            $(this).closest('[data-theme-card]').toggleClass('active', this === that);
        });
        applyThemePreview(that.value);
    });
</script>
